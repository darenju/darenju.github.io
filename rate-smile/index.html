<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coucou</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Comfortaa:700' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="rate">
        <div class="rate__mark">
            <div class="rate__mark__value">2.5</div>
            <div class="rate__mark__max">5</div>

        <div class="rate__img">
            <svg preserveAspectRatio="xMinYMin meet" viewBox="0 0 500 500" class="rate__svg">
                <circle cx="250" cy="250" r="245" class="stroke" />
                <path d="M 120 350 q 130 -100 260 0" class="stroke" id="mouth" />
            </svg>
        </div>
    </div>
    <script src="lib/rainbow.js"></script>
    <script src="mouth.js"></script>

</html>
